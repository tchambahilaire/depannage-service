    <script>

        // ============ PROMOTIONS ============
        let promotions = [
            { code: 'BIENVENUE10', discount: 10, description: '10% sur votre premiere intervention' },
            { code: 'PARRAIN20', discount: 20, description: '20% pour vous et votre ami' },
            { code: 'FIDELITE50', discount: 50, description: '50% apres 5 interventions', pointsRequired: 500 },
            { code: 'URGENCE15', discount: 15, description: '15% pour les appels durgence' }
        ];
        
        // ============ CATALOGUE PIECES ============
        const partsCatalog = [
            { id: 1, name: 'Batterie 12V', price: 25000, icon: 'fas fa-bolt', stock: 10, brand: 'VARTA' },
            { id: 2, name: 'Pneu Michelin', price: 35000, icon: 'fas fa-circle', stock: 8, brand: 'Michelin' },
            { id: 3, name: 'Huile moteur 5L', price: 12000, icon: 'fas fa-oil-can', stock: 15, brand: 'Total' },
            { id: 4, name: 'Plaquettes frein', price: 8000, icon: 'fas fa-stop', stock: 12, brand: 'Bosch' },
            { id: 5, name: 'Filtre a huile', price: 3000, icon: 'fas fa-filter', stock: 20, brand: 'Mann' },
            { id: 6, name: 'Alternateur', price: 45000, icon: 'fas fa-cog', stock: 5, brand: 'Valeo' }
        ];
        
        // ============ TRADUCTIONS ============
        const translations = {
            fr: {
                title: "Depannage Service", driver: "Chauffeur", mechanic: "Mecanicien",
                phone: "Telephone", password: "Mot de passe", login: "Se connecter",
                register: "S'inscrire", forgot: "Mot de passe oublie ?", createAccount: "Creer un compte",
                back: "Retour", emergency: "Appel d'urgence", sos: "SOS Urgence",
                tracking: "Suivi GPS", chat: "Discussion", support: "Support",
                parts: "Pieces detachees", verify: "Verification", promo: "Promotions",
                invoice: "Factures", darkMode: "Mode nuit", language: "Langue",
                guest: "Mode invite", share: "Partager", loyalty: "Fidelite", reviews: "Avis",
                notifications: "Notifications", theme: "Theme", security: "Securite",
                enterprise: "Entreprise", fleet: "Flotte", employees: "Employes",

            },
            en: {
                title: "Breakdown Service", driver: "Driver", mechanic: "Mechanic",
                phone: "Phone", password: "Password", login: "Login",
                register: "Register", forgot: "Forgot password?", createAccount: "Create account",
                back: "Back", emergency: "Emergency call", sos: "SOS Emergency",
                tracking: "GPS Tracking", chat: "Discussion", support: "Support",
                parts: "Spare parts", verify: "Verification", promo: "Promotions",
                invoice: "Invoices", darkMode: "Dark mode", language: "Language",
                guest: "Guest mode", share: "Share", loyalty: "Loyalty", reviews: "Reviews",
                notifications: "Notifications", theme: "Theme", security: "Security",
                enterprise: "Enterprise", fleet: "Fleet", employees: "Employees",
                reports: "Reports", alerts: "Alerts", settings: "Settings"
            }
        };
        
        function t(key) { return translations[currentLanguage][key] || key; }
        
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#dc2626' : '#333';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        function addNotification(title, message, type = 'info') {
            notifications.unshift({ id: Date.now(), title, message, type, date: new Date().toLocaleString(), read: false });
            localStorage.setItem('notifications', JSON.stringify(notifications));
            showToast('Notification: ' + title);
            playNotificationSound();
        }
        
        function playNotificationSound() {
            try {
                const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
                audio.volume = 0.2;
                audio.play().catch(e => console.log('Son non joue'));
            } catch(e) {}
        }
        
        // ============ DOUBLE IDENTIFICATION ============
        let verificationCode = null;
        let verificationPhone = null;

        function sendVerificationCode(phone) {
            verificationCode = Math.floor(100000 + Math.random() * 900000);
            verificationPhone = phone;
            showToast('📱 Code de verification envoye a ' + phone);
            addNotification('Verification', 'Code envoye a ' + phone, 'info');
            console.log('🔑 Code de verification:', verificationCode);
            return verificationCode;
        }

        function verifyCode(enteredCode) {
            if (parseInt(enteredCode) === verificationCode) {
                verificationCode = null;
                return true;
            }
            return false;
        }

        // ============ SCAN DE LA CNI ============
        function scanCNI() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(function(stream) {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.autoplay = true;
                        video.style.width = '100%';
                        video.style.height = '400px';
                        video.style.borderRadius = '15px';
                        video.style.objectFit = 'cover';
                        
                        const container = document.createElement('div');
                        container.style.position = 'fixed';
                        container.style.top = '0';
                        container.style.left = '0';
                        container.style.right = '0';
                        container.style.bottom = '0';
                        container.style.background = 'rgba(0,0,0,0.9)';
                        container.style.zIndex = '1000';
                        container.style.display = 'flex';
                        container.style.flexDirection = 'column';
                        container.style.alignItems = 'center';
                        container.style.justifyContent = 'center';
                        container.style.padding = '20px';
                        
                        const videoWrapper = document.createElement('div');
                        videoWrapper.style.width = '100%';
                        videoWrapper.style.maxWidth = '400px';
                        videoWrapper.style.position = 'relative';
                        videoWrapper.appendChild(video);
                        
                        const frame = document.createElement('div');
                        frame.style.position = 'absolute';
                        frame.style.top = '50%';
                        frame.style.left = '50%';
                        frame.style.transform = 'translate(-50%, -50%)';
                        frame.style.width = '300px';
                        frame.style.height = '180px';
                        frame.style.border = '3px solid #ff6b35';
                        frame.style.borderRadius = '10px';
                        frame.style.boxShadow = '0 0 30px rgba(255,107,53,0.3)';
                        videoWrapper.appendChild(frame);
                        
                        const instructions = document.createElement('p');
                        instructions.textContent = 'Placez votre CNI dans le cadre';
                        instructions.style.color = 'white';
                        instructions.style.marginTop = '15px';
                        instructions.style.fontSize = '16px';
                        
                        const buttonContainer = document.createElement('div');
                        buttonContainer.style.display = 'flex';
                        buttonContainer.style.gap = '15px';
                        buttonContainer.style.marginTop = '20px';
                        buttonContainer.style.width = '100%';
                        buttonContainer.style.maxWidth = '400px';
                        
                        const captureBtn = document.createElement('button');
                        captureBtn.textContent = 'CAPTURER LA CNI';
                        captureBtn.style.flex = '1';
                        captureBtn.style.padding = '15px';
                        captureBtn.style.background = '#ff6b35';
                        captureBtn.style.color = 'white';
                        captureBtn.style.border = 'none';
                        captureBtn.style.borderRadius = '15px';
                        captureBtn.style.fontWeight = 'bold';
                        captureBtn.style.cursor = 'pointer';
                        
                        const cancelBtn = document.createElement('button');
                        cancelBtn.textContent = 'ANNULER';
                        cancelBtn.style.flex = '1';
                        cancelBtn.style.padding = '15px';
                        cancelBtn.style.background = '#dc2626';
                        cancelBtn.style.color = 'white';
                        cancelBtn.style.border = 'none';
                        cancelBtn.style.borderRadius = '15px';
                        cancelBtn.style.fontWeight = 'bold';
                        cancelBtn.style.cursor = 'pointer';
                        
                        buttonContainer.appendChild(captureBtn);
                        buttonContainer.appendChild(cancelBtn);
                        
                        container.appendChild(videoWrapper);
                        container.appendChild(instructions);
                        container.appendChild(buttonContainer);
                        document.body.appendChild(container);
                        
                        captureBtn.onclick = function() {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            
                            const cniNumber = prompt('🔑 Entrez le numero de la CNI detecte:');
                            if (cniNumber) {
                                const cniData = {
                                    id: Date.now(),
                                    number: cniNumber,
                                    name: prompt('Nom complet sur la CNI:'),
                                    birthDate: prompt('Date de naissance:'),
                                    issueDate: prompt('Date de delivrance:'),
                                    image: canvas.toDataURL('image/jpeg'),
                                    date: new Date().toLocaleString()
                                };
                                cniScans.push(cniData);

        function register() {
            const phone = document.getElementById('regPhone')?.value;

            const name = document.getElementById('regName')?.value;
            const cniNumber = document.getElementById('regCNI')?.value;

        // ============ 2FA OPTIONNELLE ============
        function toggleTwoFactorForUser() {
            const userId = currentUser?.id;
            if (!userId) { showToast("Connectez-vous d'abord", true); return; }
            if (!twoFactorAuth[userId]) { twoFactorAuth[userId] = { enabled: false, phone: '' }; }
            const isEnabled = twoFactorAuth[userId].enabled;
            if (!isEnabled) {
                const phone = prompt("Entrez votre numero de telephone pour recevoir les codes:");
                if (phone && phone.length >= 8) {
                    twoFactorAuth[userId] = { enabled: true, phone: phone };
                    localStorage.setItem('twoFactorAuth', JSON.stringify(twoFactorAuth));
                    showToast('2FA activee avec succes');
                    addNotification("Securite", "Authentification a deux facteurs activee", "success");
                } else {
                    showToast('Numero invalide', true);
                    return;
                }
            } else {
                twoFactorAuth[userId] = { enabled: false, phone: '' };
                localStorage.setItem('twoFactorAuth', JSON.stringify(twoFactorAuth));
                showToast('2FA desactivee');
            }
            refreshUI();
        }

        // ============ SCAN DE PLAQUE ============
        function scanPlate() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(function(stream) {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.autoplay = true;
                        video.style.width = '100%';
                        video.style.height = '300px';
                        video.style.borderRadius = '15px';
                        video.style.objectFit = 'cover';
                        
                        const container = document.createElement('div');
                        container.style.position = 'fixed';
                        container.style.top = '0';
                        container.style.left = '0';
                        container.style.right = '0';
                        container.style.bottom = '0';
                        container.style.background = 'rgba(0,0,0,0.9)';
                        container.style.zIndex = '1000';
                        container.style.display = 'flex';
                        container.style.flexDirection = 'column';
                        container.style.alignItems = 'center';
                        container.style.justifyContent = 'center';
                        container.style.padding = '20px';
                        
                        const videoWrapper = document.createElement('div');
                        videoWrapper.style.width = '100%';
                        videoWrapper.style.maxWidth = '400px';
                        videoWrapper.style.position = 'relative';
                        videoWrapper.appendChild(video);
                        
                        const frame = document.createElement('div');
                        frame.style.position = 'absolute';
                        frame.style.top = '50%';
                        frame.style.left = '50%';
                        frame.style.transform = 'translate(-50%, -50%)';
                        frame.style.width = '250px';
                        frame.style.height = '80px';
                        frame.style.border = '3px solid #ff6b35';
                        frame.style.borderRadius = '10px';
                        frame.style.boxShadow = '0 0 30px rgba(255,107,53,0.3)';
                        videoWrapper.appendChild(frame);
                        
                        const instructions = document.createElement('p');
                        instructions.textContent = 'Placez la plaque dans le cadre';
                        instructions.style.color = 'white';
                        instructions.style.marginTop = '15px';
                        instructions.style.fontSize = '16px';
                        
                        const buttonContainer = document.createElement('div');
                        buttonContainer.style.display = 'flex';
                        buttonContainer.style.gap = '15px';
                        buttonContainer.style.marginTop = '20px';
                        buttonContainer.style.width = '100%';
                        buttonContainer.style.maxWidth = '400px';
                        
                        const captureBtn = document.createElement('button');
                        captureBtn.textContent = 'CAPTURER';
                        captureBtn.style.flex = '1';
                        captureBtn.style.padding = '15px';
                        captureBtn.style.background = '#ff6b35';
                        captureBtn.style.color = 'white';
                        captureBtn.style.border = 'none';
                        captureBtn.style.borderRadius = '15px';
                        captureBtn.style.fontWeight = 'bold';
                        captureBtn.style.cursor = 'pointer';
                        
                        const cancelBtn = document.createElement('button');
                        cancelBtn.textContent = 'ANNULER';
                        cancelBtn.style.flex = '1';
                        cancelBtn.style.padding = '15px';
                        cancelBtn.style.background = '#dc2626';
                        cancelBtn.style.color = 'white';
                        cancelBtn.style.border = 'none';
                        cancelBtn.style.borderRadius = '15px';
                        cancelBtn.style.fontWeight = 'bold';
                        cancelBtn.style.cursor = 'pointer';
                        
                        buttonContainer.appendChild(captureBtn);
                        buttonContainer.appendChild(cancelBtn);
                        
                        container.appendChild(videoWrapper);
                        container.appendChild(instructions);
                        container.appendChild(buttonContainer);
                        document.body.appendChild(container);
                        
                        captureBtn.onclick = function() {
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            const plateNumber = prompt('Entrez le numero de la plaque detectee:');
                            if (plateNumber) {
                                const vehicle = prompt('Marque et modele du vehicule:');
                                plateScans.push({
                                    id: Date.now(),
                                    plate: plateNumber.toUpperCase(),
                                    vehicle: vehicle || 'Non renseigne',
                                    date: new Date().toLocaleString(),
                                    image: canvas.toDataURL('image/jpeg')
                                });
                                localStorage.setItem('plateScans', JSON.stringify(plateScans));
                                showToast('Plaque ' + plateNumber + ' enregistree');
                                addNotification('Scan plaque', 'Plaque ' + plateNumber + ' scannée', 'info');
                            }
                            stream.getTracks().forEach(track => track.stop());
                            document.body.removeChild(container);
                            refreshUI();
                        };
                        
                        cancelBtn.onclick = function() {
                            stream.getTracks().forEach(track => track.stop());
                            document.body.removeChild(container);
                            refreshUI();
                        };
                        
                        document.addEventListener('keydown', function escHandler(e) {
                            if (e.key === 'Escape') {
                                stream.getTracks().forEach(track => track.stop());
                                document.body.removeChild(container);
                                document.removeEventListener('keydown', escHandler);
                                refreshUI();
                            }
                        });
                    })
                    .catch(function(err) {
                        showToast('Impossible d acceder a la camera', true);
                        const plate = prompt('Entrez la plaque d immatriculation:');
                        if (plate) {
                            const vehicle = prompt('Marque et modele du vehicule:');
                            plateScans.push({
                                id: Date.now(),
                                plate: plate.toUpperCase(),
                                vehicle: vehicle || 'Non renseigne',
                                date: new Date().toLocaleString()
                            });
                            localStorage.setItem('plateScans', JSON.stringify(plateScans));
                            showToast('Plaque ' + plate + ' enregistree');
                            addNotification('Scan plaque', 'Plaque ' + plate + ' enregistree', 'info');
                            refreshUI();
                        }
                    });
            } else {
                showToast('Camera non disponible - Saisie manuelle', true);
                const plate = prompt('Entrez la plaque d immatriculation:');
                if (plate) {
                    const vehicle = prompt('Marque et modele du vehicule:');
                    plateScans.push({
                        id: Date.now(),
                        plate: plate.toUpperCase(),
                        vehicle: vehicle || 'Non renseigne',
                        date: new Date().toLocaleString()

                    showToast('Plaque ' + plate + ' enregistree');
                    addNotification('Scan plaque', 'Plaque ' + plate + ' enregistree', 'info');
                    refreshUI();
                }
            }
        }

        // ============ SUIVI GPS ============
        function showTrackingMap() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="card">
                    <div class="logo">
                        <div class="logo-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <h2>Suivi GPS</h2>
                    </div>
                    <div id="trackingMap" class="tracking-map"></div>
                    <div style="margin:15px 0">
                        <p>Distance: <span id="distance">2.3 km</span></p>
                        <p>Arrivee: <span id="eta">10 min</span></p>
                    </div>
                    <button onclick="shareLocation()" class="share-btn"><i class="fab fa-whatsapp"></i> Partager ma position</button>
                    <button onclick="refreshUI()">Retour</button>
                </div>
            `;
            
            const map = L.map('trackingMap').setView([14.7167, -17.4677], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const driverLat = pos.coords.latitude;
                    const driverLng = pos.coords.longitude;
                    L.marker([driverLat, driverLng], { icon: L.divIcon({ html: '<div style="background:#ff6b35; width:20px; height:20px; border-radius:50%;"></div>', iconSize: [20,20] }) }).addTo(map);
                    map.setView([driverLat, driverLng], 14);
                    
                    let mechanicLat = driverLat + 0.02;
                    let mechanicLng = driverLng + 0.02;
                    let mechanicMarker = L.marker([mechanicLat, mechanicLng], { icon: L.divIcon({ html: '<div style="background:#22c55e; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px;">M</div>', iconSize: [25,25] }) }).addTo(map);
                    
                    let distance = 2.3, eta = 10;
                    if (trackingInterval) clearInterval(trackingInterval);
                    trackingInterval = setInterval(() => {
                        distance = Math.max(0, distance - 0.15);
                        eta = Math.max(0, eta - 1);
                        mechanicLat -= 0.003;
                        mechanicLng -= 0.003;
                        mechanicMarker.setLatLng([mechanicLat, mechanicLng]);
                        document.getElementById('distance').innerText = distance > 0 ? distance.toFixed(1) + ' km' : 'Arrive !';
                        document.getElementById('eta').innerText = eta > 0 ? eta + ' min' : 'Arrive !';
                        if (distance <= 0) clearInterval(trackingInterval);
                    }, 2000);
                });
            }
        }

                                    <small>De: ${n.fromUserName}</small>
                                    ${!n.read && n.toUserId === currentUser?.id ? '<button onclick="markNotificationRead(' + n.id + ')" style="width:auto; padding:5px 10px; margin-top:5px;">Marquer comme lue</button>' : ''}

                            <textarea id="notifMessage" rows="2" placeholder="Message"></textarea>
                            <div class="role-buttons">
                                <button onclick="sendToAllDrivers()" style="background:#3b82f6;">Aux chauffeurs</button>
                                <button onclick="sendToAllMechanics()" style="background:#22c55e;">Aux mecaniciens</button>
                            </div>
                        </div>
                    ` : ''}
                    <button onclick="refreshUI()">Retour</button>
                </div>
            `;
            
            chatNotifications.forEach(n => {
                if (n.toUserId === currentUser?.id && !n.read) n.read = true;
            });
            localStorage.setItem('chatNotifications', JSON.stringify(chatNotifications));
        }

        function markNotificationRead(id) {
            const notif = chatNotifications.find(n => n.id === id);

            localStorage.setItem('chatNotifications', JSON.stringify(chatNotifications));

        function sendToAllDrivers() {

            notifyAllDrivers(title, message);
            document.getElementById('notifTitle').value = '';
            document.getElementById('notifMessage').value = '';
            showToast('Notification envoyee a tous les chauffeurs');
        }

        function sendToAllMechanics() {
            const title = document.getElementById('notifTitle')?.value;
            const message = document.getElementById('notifMessage')?.value;
            if (!title || !message) { showToast("Remplissez tous les champs", true); return; }
            notifyAllMechanics(title, message);
            document.getElementById('notifTitle').value = '';
            document.getElementById('notifMessage').value = '';
            showToast('Notification envoyee a tous les mecaniciens');

        // ============ REVIEWS ============
        function showReviews() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="card">
                    <div class="logo">
                        <div class="logo-icon"><i class="fas fa-star"></i></div>
                        <h1>Avis des utilisateurs</h1>
                    </div>

                        ${reviews.length === 0 ? '<p>Aucun avis pour le moment</p>' : reviews.map(r => `

                                <strong>${r.userName}</strong> ${r.rating}/5<br>
                                "${r.comment}"<br>
                                <small>${r.date}</small>
                            </div>
                        `).join('')}
                    </div>
                    <textarea id="reviewComment" rows="2" placeholder="Partagez votre experience..."></textarea>
                    <div class="rating-stars">
                        ${[1,2,3,4,5].map(i => `<span class="star" onclick="setRating(${i})">★</span>`).join('')}

                    <button onclick="refreshUI()">Retour</button>
                </div>
            `;

        let selectedRating = 5;
        function setRating(rating) { 
            selectedRating = rating;
            document.querySelectorAll('.star').forEach((s, i) => {
                if (i < rating) s.classList.add('active');
                else s.classList.remove('active');
            });
        }

        function submitReview() {
            const comment = document.getElementById('reviewComment').value;
            if (!comment) { showToast("Ecrivez votre avis", true); return; }
            reviews.push({ id: Date.now(), userName: currentUser.name, rating: selectedRating, comment, date: new Date().toLocaleString() });
            localStorage.setItem('reviews', JSON.stringify(reviews));
            showToast('Merci pour votre avis !');
            showReviews();
        }

        // ============ SHARE LOCATION ============
        function shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const location = 'https://maps.google.com/?q=' + pos.coords.latitude + ',' + pos.coords.longitude;
                    if (navigator.share) {
                        navigator.share({ title: 'Ma position', text: 'Je suis ici', url: location });
                    } else {
                        navigator.clipboard.writeText(location);
                        showToast('Position copiee');
                    }
                }, () => showToast("Impossible d'obtenir la position", true));
            }
        }

                    <div class="stat-card"><div style="font-size:28px;">${mechanics.length}</div><div>Mecaniciens</div></div>
                    <div class="stat-card"><div style="font-size:28px;">${users.length}</div><div>Inscrits</div></div>
                </div>
                
                <div class="role-buttons">

                    <button onclick="showMobileApp()"><i class="fas fa-mobile-screen"></i> App mobile</button>

                    <button onclick="showInsurance()"><i class="fas fa-shield-halved"></i> Assurance</button>

                <div class="card">
                    <h3>Type de panne</h3>

                    localStorage.setItem('users', JSON.stringify(users));
                }
                refreshUI();
            }, 3000);
        }

            const content = document.getElementById('adminContent');
            if (section === 'verif') {
                const pending = pendingVerifications.filter(v => v.status === 'pending');
                content.innerHTML = pending.map(v => `<div class="log-entry"><strong>${v.name}</strong> - ${v.license}<br><button onclick="approveUser(${v.userId})" style="background:#22c55e;">Approuver</button> <button onclick="rejectUser(${v.userId})" style="background:#dc2626;">Rejeter</button></div>`).join('') || '<p>Aucune demande</p>';
            } else if (section === 'support') {
                content.innerHTML = supportTickets.map(t => `<div class="log-entry"><strong>${t.title}</strong><br>${t.message}<br><small>${t.date}</small></div>`).join('') || '<p>Aucun ticket</p>';

                content.innerHTML = reviews.map(r => `<div class="log-entry"><strong>${r.userName}</strong> ${r.rating}/5<br>"${r.comment}"<br><small>${r.date}</small></div>`).join('') || '<p>Aucun avis</p>';

                content.innerHTML = users.map(u => `<div class="log-entry"><strong>${u.name}</strong> - ${u.phone} - ${u.role} <button onclick="banUser('${u.phone}')" style="background:#dc2626;">Bannir</button></div>`).join('');

            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
